<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>GeoBrain By Kai 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f0;--green:#639922;--gl:#e8f0d8;--gm:#c8dda0;
  --gold:#f59e0b;--goldd:#d97706;
  --red:#ff4b2b;--blk:#1a1a1a;--wht:#fff;--purple:#7c3aed;
  --sh:8px 8px 0 #1a1a1a;--shsm:4px 4px 0 #1a1a1a;
  --bd:3px solid #1a1a1a;--r:14px;--hdr:56px;--mob:0;
}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);display:flex;flex-direction:column;height:100vh;touch-action:manipulation}

/* ══ LOADER ══ */
#loader{position:fixed;inset:0;background:var(--blk);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loader .logo{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;color:var(--wht)}
#loader .logo span{color:var(--green)}
#loader .bar{width:200px;height:6px;background:#333;border-radius:3px;overflow:hidden}
#loader .fill{height:100%;background:var(--green);border-radius:3px;animation:load 2s ease forwards}
@keyframes load{from{width:0}to{width:100%}}
#loader .sub{font-size:13px;color:#aaa;font-family:'Space Mono',monospace}
#loader.done{animation:fadeOut 0.5s 0.3s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}

/* ══ KEBAB ══ */
#kebab-wrap{position:fixed;top:15px;right:15px;z-index:10000;display:none}
#kebab-btn{background:var(--wht);border:var(--bd);width:40px;height:40px;border-radius:10px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shsm);font-weight:900;color:var(--blk)}
#kebab-btn:active{transform:translate(2px,2px);box-shadow:none}
#kebab-menu{position:absolute;top:50px;right:0;background:var(--wht);border:var(--bd);border-radius:var(--r);box-shadow:var(--sh);width:200px;display:none;overflow:hidden}
#kebab-menu.open{display:block}
.menu-item{padding:13px 16px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;border-bottom:2px solid #eee;cursor:pointer;display:flex;align-items:center;gap:8px}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--gl)}
.menu-item:active{background:var(--gm)}

/* ══ MODE SCREEN ══ */
#mode-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#mode-screen.hidden{display:none}
.ms-logo{font-family:'Space Mono',monospace;font-size:clamp(28px,6vw,48px);font-weight:700;color:var(--blk);letter-spacing:-2px;margin-bottom:2px}
.ms-logo span{color:var(--green)}
.ms-tag{font-size:11px;color:#888;margin-bottom:clamp(14px,3vh,28px);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.ms-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:500px;margin-bottom:12px}
.ms-card{background:var(--wht);border:var(--bd);border-radius:var(--r);padding:clamp(14px,3vw,22px) 14px;cursor:pointer;box-shadow:var(--sh);transition:all 0.12s;text-align:center;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none}
.ms-card:hover{transform:translate(-3px,-3px);box-shadow:11px 11px 0 var(--blk)}
.ms-card:active{transform:translate(4px,4px)!important;box-shadow:2px 2px 0 var(--blk)!important}
.ms-icon{font-size:clamp(26px,5vw,36px);margin-bottom:6px;display:block}
.ms-label{font-family:'Space Mono',monospace;font-size:clamp(11px,2.5vw,13px);font-weight:700;color:var(--blk);margin-bottom:3px}
.ms-desc{font-size:clamp(9px,2vw,11px);color:#888;font-weight:600;line-height:1.4}
.ms-card.grn{background:var(--green)}.ms-card.grn .ms-label,.ms-card.grn .ms-desc{color:var(--wht)}
.ms-card.gold-card{background:#fffbe6;border-color:var(--gold)}.ms-card.gold-card .ms-badge{background:var(--gold);color:var(--blk)}
.ms-card.dark{background:var(--blk)}.ms-card.dark .ms-label,.ms-card.dark .ms-desc{color:var(--wht)}
.ms-badge{position:absolute;top:8px;right:8px;background:var(--red);color:var(--wht);font-family:'Space Mono',monospace;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;border:1.5px solid var(--blk)}

/* ══ STATS BAR ══ */
.ms-stats{display:flex;gap:10px;max-width:500px;width:100%}
.ms-stat{flex:1;background:var(--wht);border:2px solid var(--blk);border-radius:10px;padding:10px;text-align:center;box-shadow:3px 3px 0 var(--blk);cursor:default}
.ms-stat-v{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--green)}
.ms-stat-v.coin-v{color:var(--goldd)}
.ms-stat-l{font-size:9px;color:#888;font-weight:700;margin-top:2px}

/* ══ COIN DISPLAY IN HEADER ══ */
#coin-disp{font-family:'Space Mono',monospace;font-size:clamp(10px,2.5vw,13px);font-weight:700;background:#fffbe6;color:var(--goldd);padding:4px 8px;border:2px solid var(--blk);border-radius:6px;box-shadow:3px 3px 0 var(--blk);white-space:nowrap;display:flex;align-items:center;gap:4px}

/* ══ MODALS ══ */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
.modal.open{display:flex}
.modal-card{background:var(--wht);border:var(--bd);border-radius:20px;box-shadow:var(--sh);padding:clamp(20px,4vw,28px);max-width:400px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Space Mono',monospace;font-size:clamp(14px,3vw,18px);font-weight:700;margin-bottom:16px;color:var(--blk)}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:9px;border:2px solid var(--blk);border-radius:9px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg);transition:all 0.1s}
.tab.on{background:var(--blk);color:var(--wht)}
.tsec{display:none}.tsec.on{display:block}
.m-input{width:100%;padding:11px 14px;border:2px solid var(--blk);border-radius:9px;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;background:var(--bg);color:var(--blk);outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px}
.m-input.sm{font-size:14px;letter-spacing:0;font-family:'Nunito',sans-serif;text-align:left}
.m-btn{width:100%;padding:13px;border:var(--bd);border-radius:9px;font-family:'Space Mono',monospace;font-size:clamp(11px,2.5vw,13px);font-weight:700;cursor:pointer;box-shadow:var(--shsm);transition:all 0.1s;margin-bottom:8px}
.m-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--blk)}
.m-btn.pri{background:var(--green);color:var(--wht)}.m-btn.sec{background:var(--bg);color:var(--blk)}.m-btn.danger{background:var(--red);color:var(--wht)}.m-btn.gold{background:var(--gold);color:var(--blk)}
#code-box{background:var(--gl);border:2px solid var(--blk);border-radius:9px;padding:14px;text-align:center;margin-bottom:12px}
#code-box .code{font-family:'Space Mono',monospace;font-size:clamp(24px,5vw,32px);font-weight:700;letter-spacing:8px;color:var(--green)}
#code-box .sub{font-size:11px;color:#888;margin-top:3px;font-weight:600}
.m-status{font-size:11px;color:#888;text-align:center;font-weight:600;min-height:16px;margin-bottom:8px}
.pnp-row{display:flex;gap:8px;margin-bottom:12px}

/* ══ ADMIN ══ */
.admin-section{background:var(--bg);border:2px solid var(--blk);border-radius:10px;padding:12px;margin-bottom:12px}
.admin-section-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:10px}
.admin-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.admin-label{font-size:13px;font-weight:700;color:var(--blk)}
.admin-sub{font-size:10px;color:#888}
.toggle{width:44px;height:24px;background:#ccc;border-radius:12px;border:2px solid var(--blk);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--wht);border-radius:50%;transition:transform 0.2s;box-shadow:1px 1px 0 rgba(0,0,0,0.2)}
.toggle.on::after{transform:translateX(20px)}
.admin-select{padding:6px 10px;border:2px solid var(--blk);border-radius:7px;font-family:'Space Mono',monospace;font-size:12px;background:var(--wht);cursor:pointer;outline:none}
.admin-num{width:70px;padding:6px 10px;border:2px solid var(--blk);border-radius:7px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;background:var(--wht);outline:none;text-align:center}
.admin-scoreboard{max-height:160px;overflow-y:auto}
.sb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;font-weight:700}
.sb-rank{font-family:'Space Mono',monospace;font-size:11px;color:#888;width:20px}
.sb-name{flex:1}.sb-score{font-family:'Space Mono',monospace;font-size:12px;color:var(--green)}

/* ══ HEADER ══ */
#header{background:var(--wht);border-bottom:var(--bd);padding:0 10px;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;z-index:1000;position:relative}
#logo{font-family:'Space Mono',monospace;font-size:clamp(15px,3.5vw,20px);font-weight:700;color:var(--blk);letter-spacing:-1px;cursor:pointer;flex-shrink:0}
#logo span{color:var(--green)}
#hdr-mid{text-align:center;flex:1;min-width:0}
#round-text{font-family:'Space Mono',monospace;font-size:clamp(8px,2vw,11px);color:var(--blk);white-space:nowrap}
#mode-badge{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;border:1.5px solid var(--blk);background:var(--blk);color:var(--wht);display:inline-block;margin-top:2px}
#hdr-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
#hearts{display:flex;gap:2px}
.heart{font-size:clamp(13px,3vw,17px);transition:transform 0.3s,opacity 0.3s}
.heart.lost{opacity:0.15;transform:scale(0.7)}
#score-disp{font-family:'Space Mono',monospace;font-size:clamp(9px,2vw,12px);font-weight:700;background:var(--green);color:var(--wht);padding:4px 7px;border:2px solid var(--blk);border-radius:6px;box-shadow:3px 3px 0 var(--blk);white-space:nowrap}
#admin-btn{width:30px;height:30px;background:var(--purple);color:var(--wht);border:2px solid var(--blk);border-radius:8px;font-size:13px;cursor:pointer;box-shadow:2px 2px 0 var(--blk);transition:all 0.1s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#admin-btn:active{transform:translate(2px,2px);box-shadow:none}

/* ══ GUESS TRACKER ══ */
#guess-tracker{position:absolute;top:10px;right:10px;z-index:502;background:var(--wht);border:var(--bd);border-radius:12px;padding:8px 12px;box-shadow:var(--shsm);display:flex;flex-direction:column;align-items:center;gap:4px;min-width:90px}
#gt-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#888}
#gt-dots{display:flex;gap:5px}
.gt-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--blk);background:#eee;transition:all 0.3s}
.gt-dot.wrong{background:var(--red)}
.gt-dot.close{background:var(--gold)}
.gt-dot.correct{background:var(--green)}
.gt-dot.current{border-color:var(--green);box-shadow:0 0 0 2px rgba(99,153,34,0.3);animation:pulse2 1s infinite}
@keyframes pulse2{0%,100%{box-shadow:0 0 0 2px rgba(99,153,34,0.3)}50%{box-shadow:0 0 0 4px rgba(99,153,34,0.15)}}
#gt-sub{font-family:'Space Mono',monospace;font-size:9px;color:#666;font-weight:700}

/* ══ GUESS HISTORY PANEL (wrong guesses for same country) ══ */
#guess-history-panel{position:absolute;top:10px;left:10px;z-index:502;background:var(--wht);border:var(--bd);border-radius:12px;padding:8px;box-shadow:var(--shsm);display:none;min-width:160px;max-width:200px}
#ghp-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:6px}
#ghp-list{display:flex;flex-direction:column;gap:4px}
.ghp-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:7px;font-size:11px;font-weight:700}
.ghp-row.wrong-g{background:#fff0ee;border:1.5px solid #ffccc7}
.ghp-row.close-g{background:#fffbe6;border:1.5px solid #fde68a}
.ghp-flag-img{width:22px;height:15px;object-fit:cover;border-radius:2px;border:1px solid #ddd}
.ghp-name{flex:1;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghp-dist{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#888}

/* ══ MAIN ══ */
#main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;height:100%;z-index:1}
.leaflet-container{background:#dde8f0}
.leaflet-control-zoom{border:var(--bd)!important;box-shadow:var(--shsm)!important}
.leaflet-control-zoom a{font-family:'Space Mono',monospace!important;font-weight:700!important;color:var(--blk)!important}

/* ══ CLUE CARD ══ */
#clue-card{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--wht);border:var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:clamp(10px,2vw,14px) clamp(12px,3vw,18px);min-width:clamp(220px,52vw,380px);max-width:min(400px,calc(100vw - 130px));z-index:500;animation:sld 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes sld{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#clue-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
#clue-lbl{font-family:'Space Mono',monospace;font-size:clamp(8px,1.8vw,10px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);background:var(--gl);padding:3px 8px;border-radius:4px;border:1.5px solid var(--gm);flex-shrink:0}
#clue-n{font-family:'Space Mono',monospace;font-size:10px;color:#888}
#clue-txt{font-size:clamp(12px,2.5vw,14px);font-weight:700;color:var(--blk);line-height:1.5}
#clue-extra{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.clue-chip{background:var(--bg);border:1.5px solid var(--blk);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--blk)}

/* ══ COIN CLUE BUTTON ══ */
#hint-btn{margin-top:10px;width:100%;padding:9px;background:#fffbe6;border:2px solid var(--blk);border-radius:8px;font-family:'Nunito',sans-serif;font-size:clamp(11px,2.5vw,13px);font-weight:800;cursor:pointer;box-shadow:3px 3px 0 var(--blk);transition:all 0.1s;color:var(--blk);display:flex;align-items:center;justify-content:center;gap:6px}
#hint-btn:hover{background:#fde68a}
#hint-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--blk)}
#hint-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:3px 3px 0 var(--blk)!important;background:#f0f0f0}

/* ══ TIMER ══ */
#timer-bar{position:absolute;top:0;left:0;right:0;height:4px;background:var(--green);transform-origin:left;transition:transform 0.1s linear;z-index:600}
#timer-bar.warning{background:var(--red)}

/* ══ SEARCH PANEL ══ */
#search-panel{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:min(92%,500px);z-index:500}
#search-wrap{background:var(--wht);border:var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:10px}
#search-row{display:flex;gap:8px}
#guess-input{flex:1;height:clamp(40px,6vh,48px);padding:0 12px;border:2px solid var(--blk);border-radius:10px;font-family:'Nunito',sans-serif;font-size:clamp(13px,3vw,15px);font-weight:700;background:var(--bg);color:var(--blk);outline:none;transition:all 0.15s;min-width:0}
#guess-input:focus{background:var(--wht);box-shadow:0 0 0 3px rgba(99,153,34,0.2);border-color:var(--green)}
#guess-input.shake{animation:shk 0.4s}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#guess-btn{height:clamp(40px,6vh,48px);padding:0 clamp(10px,3vw,18px);background:var(--green);color:var(--wht);border:2px solid var(--blk);border-radius:10px;font-family:'Space Mono',monospace;font-size:clamp(11px,2.5vw,13px);font-weight:700;cursor:pointer;box-shadow:var(--shsm);transition:all 0.1s;white-space:nowrap;flex-shrink:0}
#guess-btn:hover{background:#527a1a}
#guess-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--blk)}

/* ══ AUTOCOMPLETE — enhanced with flag image, region, compass ══ */
#ac-list{position:absolute;bottom:100%;left:0;right:0;background:var(--wht);border:var(--bd);border-radius:var(--r);box-shadow:var(--sh);max-height:min(260px,42vh);overflow-y:auto;margin-bottom:8px;display:none;z-index:600}
#ac-list.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee;transition:background 0.1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--gl)}
.ac-flag-img{width:32px;height:22px;object-fit:cover;border-radius:3px;border:1.5px solid #ddd;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:clamp(13px,3vw,14px);font-weight:800;color:var(--blk)}
.ac-name .m{color:var(--green)}
.ac-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.ac-region{font-size:10px;font-weight:700;color:#888;background:var(--bg);border:1.5px solid #ddd;border-radius:4px;padding:1px 5px}
.ac-compass{font-size:10px;font-weight:700;color:var(--purple);background:#f3f0ff;border:1.5px solid #c4b5fd;border-radius:4px;padding:1px 5px}
.ac-capital{font-size:10px;color:#aaa;font-weight:700}

/* ══ HISTORY TRAY ══ */
#hist-tray{position:absolute;right:10px;top:10px;bottom:clamp(70px,12vh,90px);width:clamp(150px,17vw,185px);z-index:400;display:flex;flex-direction:column}
#hist-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:6px}
#hist-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;scrollbar-width:thin}
.hi{background:var(--wht);border:2px solid var(--blk);border-radius:10px;padding:6px 8px;display:flex;align-items:center;gap:7px;box-shadow:3px 3px 0 var(--blk);animation:pop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes pop{from{transform:scale(0.8) translateX(20px);opacity:0}to{transform:scale(1) translateX(0);opacity:1}}
.hi-flag{width:24px;height:16px;object-fit:cover;border-radius:2px;border:1px solid #ddd;flex-shrink:0}
.hi-flag-emoji{font-size:16px;line-height:1;flex-shrink:0}
.hi-info{flex:1;min-width:0}
.hi-name{font-size:11px;font-weight:800;color:var(--blk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-who{font-size:8px;color:#aaa;font-weight:700}
.hi-dist{font-family:'Space Mono',monospace;font-size:9px;font-weight:700}
.hi-dist.f{color:var(--red)}.hi-dist.c{color:var(--green)}.hi-dist.m{color:var(--gold)}

/* ══ AI BADGE ══ */
#ai-badge{position:absolute;left:10px;bottom:clamp(70px,12vh,90px);background:var(--blk);color:var(--wht);border:2px solid var(--blk);border-radius:10px;padding:8px 12px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;z-index:400;box-shadow:var(--shsm);display:none}
#ai-badge.on{display:block}

/* ══ STREAK TOAST ══ */
#streak-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--blk);color:var(--wht);border:var(--bd);border-radius:16px;padding:16px 24px;font-family:'Space Mono',monospace;font-size:clamp(16px,4vw,22px);font-weight:700;z-index:800;pointer-events:none;text-align:center;box-shadow:var(--sh);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s}
#streak-toast.show{transform:translate(-50%,-50%) scale(1)}
#streak-toast.hide{transform:translate(-50%,-50%) scale(0);opacity:0}
