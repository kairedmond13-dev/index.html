<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BorderBrain - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --neo-border: 3px solid #000;
    --neo-shadow: 8px 8px 0px #000;
    --neo-shadow-sm: 4px 4px 0px #000;
    --primary: #639922;
    --bg: #f4f6f0;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Map background */
  #map {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    filter: grayscale(0.3) contrast(1.1);
  }

  /* Main Game Container */
  #game {
    position: relative;
    z-index: 10;
    background: #fff;
    border: var(--neo-border);
    box-shadow: var(--neo-shadow);
    padding: 2rem 1.5rem;
    width: 95%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 0; /* Neobrutalism usually prefers sharp corners */
  }

  /* Neobrutalism UI Elements */
  .neo-btn {
    background: var(--primary);
    color: #fff;
    border: var(--neo-border);
    box-shadow: var(--neo-shadow-sm);
    padding: 10px 20px;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .neo-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0px #000;
  }

  .neo-input {
    border: var(--neo-border);
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    outline: none;
  }

  /* Header */
  #header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  #title { font-size: 24px; font-weight: 800; color: #000; }
  #title span { color: var(--primary); }
  
  #round-badge {
    background: #fff;
    border: var(--neo-border);
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 800;
  }

  /* Score Pips - Admin trigger */
  #score-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1rem;
    cursor: pointer;
  }
  .score-pip {
    width: 30px; height: 12px;
    border: 2px solid #000;
    background: #fff;
  }
  .score-pip.won { background: var(--primary); }
  .score-pip.lost { background: #ff5c5c; }
  .score-pip.current { background: #ffff00; }

  /* Clue Box */
  #clue-box {
    border: var(--neo-border);
    background: #f0f5e8;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  #clue-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
  #clue-text { font-size: 15px; font-weight: 700; line-height: 1.4; }

  /* Input/Autocomplete */
  #input-row { display: flex; gap: 8px; margin-bottom: 1rem; position: relative; }
  #autocomplete { flex: 1; position: relative; }
  #guess-input { width: 100%; height: 45px; font-size: 15px; }
  #suggestions {
    position: absolute; bottom: 50px; left: 0; right: 0;
    background: #fff; border: var(--neo-border);
    z-index: 100; max-height: 200px; overflow-y: auto;
  }
  .suggestion { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-weight: 700; }
  .suggestion:hover { background: #ffff00; }

  /* Guesses List */
  #guesses-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .guess-row {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: var(--neo-border);
    padding: 8px 12px;
    font-weight: 700;
  }
  .guess-name { flex: 1; font-size: 14px; }
  .guess-distance { font-family: 'Space Mono', monospace; font-size: 12px; }
  .guess-dir { font-size: 20px; font-weight: bold; transition: transform 0.5s; }

  /* Overlays / Modals */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .neo-modal {
    background: #fff; border: var(--neo-border); box-shadow: var(--neo-shadow);
    padding: 2rem; width: 90%; max-width: 400px; text-align: center;
  }

  /* Admin Terminal */
  #admin-terminal {
    display: none;
    background: #000; color: #0f0; border: 3px solid #333;
    padding: 1rem; font-family: 'Space Mono', monospace;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2000; width: 300px;
  }
  .admin-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 5px; margin: 5px; cursor: pointer; width: 100%; }

  /* Compass Arrow */
  .compass-arrow { display: inline-block; font-size: 24px; }

  /* Lobby Specific */
  #lobby-selection { display: flex; flex-direction: column; gap: 1rem; }
  .lobby-code-display { font-size: 32px; font-family: 'Space Mono'; letter-spacing: 5px; font-weight: 800; margin: 10px 0; border: 2px dashed #000; padding: 10px; }

  @media (max-width: 600px) {
    #game { padding: 1rem; }
    #title { font-size: 20px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="game">
  <div id="header-row">
    <div id="title">🧠 Border<span>Brain</span></div>
    <div id="round-badge">Round 1 of 5</div>
  </div>

  <div id="lobby-ui">
    <div id="lobby-selection">
      <h2 style="margin-bottom:10px">Online Lobby</h2>
      <button class="neo-btn" onclick="hostGame()">Host Game</button>
      <div style="display:flex; gap: 5px;">
        <input id="join-input" class="neo-input" style="flex:1" placeholder="CODE" maxlength="4">
        <button class="neo-btn" onclick="joinGame()">Join</button>
      </div>
      <button class="neo-btn" style="background:#eee; color:#000;" onclick="startSolo()">Play Solo</button>
    </div>

    <div id="lobby-waiting" style="display:none">
      <p>Your Room Code:</p>
      <div id="room-code-val" class="lobby-code-display">----</div>
      <p>Waiting for guest...</p>
    </div>
  </div>

  <div id="gameplay-ui" style="display:none">
    <div id="score-bar" onclick="triggerAdmin()"></div>
    
    <div id="clue-box">
      <div id="clue-label">Clue 1</div>
      <div id="clue-text">Pick a mode to start!</div>
    </div>

    <div id="input-row">
      <div id="autocomplete">
        <input id="guess-input" class="neo-input" type="text" placeholder="Search country..." autocomplete="off" />
        <div id="suggestions"></div>
      </div>
      <button id="submit-btn" class="neo-btn">Guess</button>
    </div>

    <div id="guesses-list"></div>
  </div>
</div>

<div id="result-overlay" class="overlay" style="display:none">
  <div class="neo-modal">
    <h2 id="res-title">Correct!</h2>
    <div id="res-body" style="margin: 15px 0">
      <p id="res-dist"></p>
      <div id="res-compass" class="compass-arrow">↑</div>
    </div>
    <button class="neo-btn" onclick="nextRound()">Next Round</button>
  </div>
</div>

<div id="admin-terminal">
  <div>--- ADMIN ACCESS ---</div>
  <button class="admin-btn" onclick="adminReveal()">Reveal Answer</button>
  <button class="admin-btn" onclick="adminSkip()">Skip Round</button>
  <button class="admin-btn" onclick="closeAdmin()" style="color:red">Exit</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
